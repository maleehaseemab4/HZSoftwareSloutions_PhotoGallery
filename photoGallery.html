<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <link rel="stylesheet" type="text/css" href="css/photoGallery.css">
    <link rel="stylesheet" type="text/css" href="css/lightbox.min.css">
    <script type="text/javascript" src="js/lightbox-plus-jquery.min.js"></script>

</head>
<body>
    <h1>Photo Gallery</h1>
    <div class="filter">
        <button class="filter-btn" data-filter="all">All</button>
        <button class="filter-btn" data-filter="animals">Animals</button>
        <button class="filter-btn" data-filter="flowers">Flowers</button>
        <button class="filter-btn" data-filter="plants">Plants</button>

    </div>
    <div class="gallery">
       <a href="assets/animal1.jpg" data-lightbox="gallery" data-category="animals"><img src="assets/animal1.1.jpg" alt="Photo 1" ></a>
        <a href="assets/animal2.jpg" data-lightbox="gallery" data-category="animals"><img src="assets/animal2.2.jpg" alt="Photo 2" ></a>
        <a href="assets/animal3.jpg" data-lightbox="gallery" data-category="animals"><img src="assets/animal3.3.jpg" alt="Photo 3" ></a>
        <a href="assets/flower1.jpg" data-lightbox="gallery" data-category="flowers"><img src="assets/flower1.1.jpg" alt="Photo 6" ></a>
        <a href="assets/flower2.jpg" data-lightbox="gallery" data-category="flowers"><img src="assets/flower2.2.jpg" alt="Photo 7" ></a>
        <a href="assets/flower3.jpg" data-lightbox="gallery" data-category="flowers"><img src="assets/flower3.3.jpg" alt="Photo 8" ></a>
        <a href="assets/flower4.jpg" data-lightbox="gallery" data-category="flowers"><img src="assets/flower4.4.jpg" alt="Photo 9" ></a>
        <a href="assets/flower5.jpg" data-lightbox="gallery" data-category="flowers"><img src="assets/flower5.5.jpg" alt="Photo 10" ></a>
        <a href="assets/plant1.jpg" data-lightbox="gallery" data-category="plants"><img src="assets/plant1.1.jpg" alt="Photo 14" ></a>
        <a href="assets/plant2.jpg" data-lightbox="gallery" data-category="plants"><img src="assets/plant2.2.jpg" alt="Photo 15" ></a>
        <a href="assets/plant3.jpg" data-lightbox="gallery" data-category="plants"><img src="assets/plant3.3.jpg" alt="Photo 16" ></a>
        <a href="assets/plant4.jpg" data-lightbox="gallery" data-category="plants"><img src="assets/plant4.4.jpg" alt="Photo 17" ></a>
        <a href="assets/plant5.jpg" data-lightbox="gallery" data-category="plants"><img src="assets/plant5.5.jpg" alt="Photo 18" ></a>
    </div>
    <script src="js/photoGallery.js"></script>
</body>
</html>
